        <div class="setup-row">
          <div class="setup-row-head" style="justify-content:center">
            <span class="tip" data-tip="Controls the server components. Restart brings everything back up after a crash or settings change. Quit stops all containers and the broker — close the browser tab afterwards.">Lifecycle</span>
          </div>
          <div class="row" style="justify-content:center">
            <button id="server-restart" title="Re-spawn the aceman web frontend and the host broker. The engine container is podman-restarted alongside. Any active player is closed first. The browser tab reloads itself when the new instance comes up.">Restart</button>
            <button id="server-shutdown" title="Stop everything: close the active external player (if any), stop the engine container, terminate the host broker, and shut down the web frontend. The browser tab will display a 'stopped' notice — you can then close it.">Quit</button>
          </div>
          <div id="container-mem-row" style="display:none; justify-content:center; align-items:center; gap:1rem; font-size:.78rem; color:var(--mut); padding-top:.35rem; flex-wrap:wrap">
            <span id="web-mem-cell" style="display:none">
              <span class="tip">Web</span> <span id="web-mem-display"></span>
              <span id="web-mem-hint" style="display:none"></span>
            </span>
            <span id="eng-mem-cell" style="display:none">
              <span class="tip">Engine</span> <span id="eng-mem-display"></span>
              <span id="eng-mem-hint" style="display:none"></span>
            </span>
          </div>
          <div style="display:flex; justify-content:center; padding-top:.35rem">
            <label style="font-size:.78rem; color:var(--mut); cursor:pointer; display:inline-flex; align-items:center; gap:.35rem">
              <input type="checkbox" id="sys-usage-toggle">
              <span class="tip" data-tip="Poll host CPU + GPU utilisation (20-second average) every few seconds. Off by default — while off, nothing is polled and the broker is never asked (no nvidia-smi spawns).">CPU / GPU usage</span>
              <!-- Live figures folded into the label while polling; cleared when off. -->
              <span id="sys-usage-figures" style="display:none"></span>
            </label>
          </div>
        </div>
