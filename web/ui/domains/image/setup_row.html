        <div class="setup-row">
          <div class="setup-row-head" style="justify-content:center;gap:.5rem">
            <span class="has-tooltip" id="image-label">Engine image</span>
            <span class="status" id="image-status">…</span>

          </details>
          <code id="image-tag" style="display:none"></code>
