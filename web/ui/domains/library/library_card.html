  <div class="card has-card-label" id="library-card">
    <span class="card-label">Library</span>

    <!-- One combined control, three icon toggles. The active toggle glows
         mustard with a black glyph (see library.css). The cog shares this
         row, pinned to the right content edge. -->
    <div class="library-tabs-row">
      <div class="library-tabs" id="library-tabs" role="tablist" aria-label="Library section">
        <button class="library-tab" data-tab="search" role="tab" aria-selected="true"
                title="Search channels" aria-label="Search channels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        </button>
        <button class="library-tab" data-tab="favourites" role="tab" aria-selected="false"
                title="Favourites" aria-label="Favourites">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M12 2.5l2.9 6.1 6.6.6-5 4.4 1.5 6.5L12 17.9 6.5 20.6 8 14.1l-5-4.4 6.6-.6z"/></svg>
        </button>
        <button class="library-tab" data-tab="history" role="tab" aria-selected="false"
                title="Watch history" aria-label="Watch history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6c-1.6-1-4-1.6-6-1.6S2.6 5 2 5.4v13.2c.6-.4 2.4-.9 4-.9s4.4.5 6 1.5"/><path d="M12 6c1.6-1 4-1.6 6-1.6S21.4 5 22 5.4v13.2c-.6-.4-2.4-.9-4-.9s-4.4.5-6 1.5"/><line x1="12" y1="6" x2="12" y2="19.6"/></svg>
        </button>
      </div>
      <button class="library-cog" id="library-cog" title="Library settings" aria-label="Library settings">⚙</button>
    </div>

    <div class="tab-panel" id="tab-search">
      <div class="field-wrap">
        <input type="text" id="search-input" class="field-input" placeholder="Search channels…"
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="field-clear" id="search-input-clear"
                title="Clear" aria-label="Clear search" style="visibility:hidden">✕</button>
      </div>
      <div class="status" id="search-status"></div>
      <div class="pager" id="search-pager" style="display:none">
        <button id="search-prev" title="Previous page" aria-label="Previous page">«</button>
        <span class="status" id="search-info"></span>
        <button id="search-next" title="Next page" aria-label="Next page">»</button>
      </div>
      <div id="search-results"></div>
    </div>

    <div class="tab-panel" id="tab-favourites" style="display:none">
      <div class="field-wrap">
        <input type="text" id="fav-search" class="field-input" placeholder="Search…">
        <button class="field-clear" id="fav-search-clear"
                title="Clear" aria-label="Clear search" style="visibility:hidden">✕</button>
      </div>
      <div class="pager" id="fav-pager" style="display:none">
        <button id="fav-prev" title="Previous page" aria-label="Previous page">«</button>
        <span class="status" id="fav-info"></span>
        <button id="fav-next" title="Next page" aria-label="Next page">»</button>
      </div>
      <div id="fav-list"></div>
      <div id="fav-empty" class="status" style="display:none">
        No favourites yet — play something and click "Save as favourite".
      </div>
    </div>

    <div class="tab-panel" id="tab-history" style="display:none">
      <div class="field-wrap">
        <input type="text" id="history-search" class="field-input" placeholder="Search…">
        <button class="field-clear" id="history-search-clear"
                title="Clear" aria-label="Clear search" style="visibility:hidden">✕</button>
      </div>
      <div class="pager" id="history-pager" style="display:none">
        <button id="history-prev" title="Previous page" aria-label="Previous page">«</button>
        <span class="status" id="history-info"></span>
        <button id="history-next" title="Next page" aria-label="Next page">»</button>
      </div>
      <div id="history-list"></div>
      <div id="history-empty" class="status" style="display:none">No watch history yet.</div>
      <div id="history-clear-row" style="display:none">
        <button id="history-clear" class="danger-outline">Clear all</button>
      </div>
    </div>
  </div>
