<div id="library-settings-modal" class="modal-backdrop" style="display:none" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div style="display:flex; align-items:center; gap:.5rem">
      <h3 style="margin:0">Library settings</h3>
      <button id="library-settings-close" class="icon-x" aria-label="Close" title="Close" style="margin-left:auto">✕</button>
    </div>
    <p class="setting-sub" style="margin:.1rem 0 .3rem 0">Changes apply immediately.</p>
    <div class="install-opt">
      <label style="display:flex; align-items:center; gap:.5rem">
        <span>Items per page</span>
        <span class="number-field">
          <input type="number" id="setting-page-size" min="3" max="100" step="1">
          <span class="number-steppers">
            <button type="button" class="number-step" id="setting-page-size-up"
                    tabindex="-1" aria-label="Increase"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg></button>
            <button type="button" class="number-step" id="setting-page-size-down"
                    tabindex="-1" aria-label="Decrease"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
          </span>
        </span>
      </label>
    </div>
    <!-- Ordering + display: label / control aligned in two columns. -->
    <div class="install-opt" style="display:grid; grid-template-columns:max-content max-content; gap:.6rem 1rem; align-items:center">
      <label style="display:contents"><span>Sort favourites by</span>
        <select id="setting-fav-sort" style="min-width:11rem" title="Order of the Favourites list">
          <option value="name">Name (A–Z)</option>
          <option value="recent">Recently played</option>
        </select></label>
      <label style="display:contents"><span>Open Library on</span>
        <select id="setting-default-tab" style="min-width:11rem" title="Which tab the Library card shows when the page loads">
          <option value="last">Last used</option>
          <option value="search">Search</option>
          <option value="favourites">Favourites</option>
          <option value="history">History</option>
        </select></label>
    </div>
    <div class="install-opt" style="display:grid; gap:.5rem">
      <label style="display:flex; align-items:center; gap:.5rem; cursor:pointer"
             title="Show the last-played column as an age like “3d ago” instead of an absolute date/time, in both Favourites and History.">
        <input type="checkbox" id="setting-relative-times">
        <span>Relative dates in Favourites &amp; History (e.g. “3d ago”)</span>
      </label>
      <label style="display:flex; align-items:center; gap:.5rem; cursor:pointer"
             title="Delete favourites and history entries without the “are you sure?” prompt. Off by default — the confirm is a safety net.">
        <input type="checkbox" id="setting-skip-delete-confirm">
        <span>Skip delete confirmations</span>
      </label>
    </div>
    <!-- Watch history (server-backed config). -->
    <div class="install-opt" style="display:grid; gap:.6rem">
      <p class="setting-sub" style="margin:0">Watch history</p>
      <label style="display:flex; align-items:center; gap:.5rem; cursor:pointer"
             title="When off, played channels are no longer added to your watch history. Existing entries are kept.">
        <input type="checkbox" id="setting-record-history">
        <span>Record watch history</span>
      </label>
      <label style="display:flex; align-items:center; gap:.5rem; cursor:pointer">
        <input type="checkbox" id="setting-remove-on-save">
        <span>Remove historic stream from <svg class="inline-glyph" width="16" height="16" style="width:1.1rem;height:1.1rem;vertical-align:-.2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6c-1.6-1-4-1.6-6-1.6S2.6 5 2 5.4v13.2c.6-.4 2.4-.9 4-.9s4.4.5 6 1.5"/><path d="M12 6c1.6-1 4-1.6 6-1.6S21.4 5 22 5.4v13.2c-.6-.4-2.4-.9-4-.9s-4.4.5-6 1.5"/><line x1="12" y1="6" x2="12" y2="19.6"/></svg> history when saved to <svg class="inline-glyph" width="16" height="16" style="width:1.1rem;height:1.1rem;vertical-align:-.2rem" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M12 2.5l2.9 6.1 6.6.6-5 4.4 1.5 6.5L12 17.9 6.5 20.6 8 14.1l-5-4.4 6.6-.6z"/></svg> favourites</span>
      </label>
      <label style="display:flex; align-items:center; gap:.5rem"
             title="Oldest entries are trimmed once the list exceeds this many channels.">
        <span>Keep last N entries</span>
        <span class="number-field">
          <input type="number" id="setting-history-cap" min="50" max="5000" step="50">
          <span class="number-steppers">
            <button type="button" class="number-step" id="setting-history-cap-up" tabindex="-1" aria-label="Increase"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg></button>
            <button type="button" class="number-step" id="setting-history-cap-down" tabindex="-1" aria-label="Decrease"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
          </span>
        </span>
      </label>
    </div>
    <div class="install-opt" style="display:flex; justify-content:flex-end">
      <button id="library-settings-reset" class="danger-outline">Reset to defaults</button>
    </div>
  </div>
</div>
