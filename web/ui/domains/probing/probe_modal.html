<div id="probe-modal" class="modal-backdrop" style="display:none" role="dialog" aria-modal="true" aria-label="Probe channels">
  <div class="modal-card">
    <div style="display:flex; align-items:center; gap:.5rem">
      <svg class="inline-glyph" width="18" height="18" style="width:1.2rem;height:1.2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
      <h3 style="margin:0">Probe channels</h3>
      <button id="probe-close" class="icon-x" aria-label="Close" title="Close" style="margin-left:auto">✕</button>
    </div>

    <!-- WHAT to check: one scope switch (per-option tooltips explain each). -->
    <div class="install-opt">
      <div class="setting-sub" style="margin:0 0 .35rem">Check</div>
      <div class="probe-scopes" role="radiogroup" aria-label="What to check">
        <label title="Probe only the active tab's visible page."><input type="radio" name="probe-scope" value="page"><span>Visible page</span></label>
        <label title="Probe every favourite (all pages), not just the visible ones."><input type="radio" name="probe-scope" value="favourites"><span>Favourites</span></label>
        <label title="Probe every result of the current search (all pages)."><input type="radio" name="probe-scope" value="search"><span>Search results</span></label>
        <label title="Probe every channel in your watch history (all pages)."><input type="radio" name="probe-scope" value="history"><span>History</span></label>
        <label title="Probe favourites, search results and history together."><input type="radio" name="probe-scope" value="everything"><span>Everything</span></label>
      </div>
      <div style="display:flex; align-items:center; gap:.9rem; margin-top:.6rem; flex-wrap:wrap">
        <button id="probe-run" class="primary" title="Run a health check over the selected scope now">Probe</button>
        <label style="display:flex; align-items:center; gap:.4rem; cursor:pointer"
               title="Keep re-checking the selected scope automatically — for a search, as you stop typing; for the others, whenever the list changes. Anything still fresh (see Advanced) is skipped, so it stays cheap.">
          <input type="checkbox" id="probe-keep-updated">
          <span>Keep updated</span>
        </label>
        <span class="setting-sub" id="probe-status" style="margin:0; flex-basis:100%"></span>
      </div>
    </div>

    <!-- HOW to check: tucked away so the common case stays uncluttered. -->
    <details class="install-opt probe-advanced">
      <summary title="Fine-tune how probing runs">Advanced</summary>

      <label style="display:flex; align-items:flex-start; gap:.5rem; cursor:pointer; margin:.6rem 0"
             title="Runs ffprobe on channels that deliver data to confirm it's a real audio/video stream; flags ones that send bytes but no usable stream and logs them for export.">
        <input type="checkbox" id="probe-deep">
        <span>Deep check — confirm it's a real stream and log the ones that aren't
          (flagged <span class="probe-badge probe-unplayable" style="display:inline">▲</span>)</span>
      </label>

      <div style="display:flex; gap:1.5rem; flex-wrap:wrap; margin-top:.4rem">
        <label style="display:flex; align-items:center; gap:.5rem"
               title="How many channels to probe at once. Higher is faster but heavier on the engine (max 8).">
          <span>Agents</span>
          <span class="number-field">
            <input type="number" id="probe-agents" min="1" max="8" step="1">
            <span class="number-steppers">
              <button type="button" class="number-step" id="probe-agents-up" tabindex="-1" aria-label="Increase"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg></button>
              <button type="button" class="number-step" id="probe-agents-down" tabindex="-1" aria-label="Decrease"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
            </span>
          </span>
        </label>
        <label style="display:flex; align-items:center; gap:.5rem"
               title="Skip re-probing a channel whose last check is newer than this. 0 = always re-probe.">
          <span>Skip if checked within</span>
          <span class="number-field">
            <input type="number" id="probe-freshness" min="0" step="1">
            <span class="number-steppers">
              <button type="button" class="number-step" id="probe-freshness-up" tabindex="-1" aria-label="Increase"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg></button>
              <button type="button" class="number-step" id="probe-freshness-down" tabindex="-1" aria-label="Decrease"><svg width="11" height="11" style="width:.7rem;height:.7rem;display:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg></button>
            </span>
          </span>
          <select id="probe-freshness-unit" title="Unit for the value on the left">
            <option value="min">minutes</option>
            <option value="hours">hours</option>
          </select>
        </label>
      </div>

      <div style="display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-top:.9rem">
        <span class="setting-sub" style="margin:0">Settings:</span>
        <button id="probe-reset" class="danger-outline" title="Restore this panel's settings — scope, keep-updated, deep check, agents and freshness — to their defaults. Does not touch the probe cache, favourites, history or the can't-play log.">Reset to defaults</button>
      </div>

      <div style="display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-top:.6rem">
        <span class="setting-sub" style="margin:0">Probe cache:</span>
        <button id="probe-cache-clear" class="danger-outline" title="Reset the health status of EVERY channel — clears all green/amber/red markers so the next probe re-checks from scratch">Clear probe cache</button>
      </div>

      <div style="display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-top:.6rem">
        <span class="setting-sub" style="margin:0">Unplayables’ log:</span>
        <span class="setting-sub" id="unplayable-count" style="margin:0"></span>
        <button id="unplayable-export" title="Download the logged can't-play channels as JSON for a bug report">Export</button>
        <button id="unplayable-clear" class="danger-outline" title="Clear the diagnostic can't-play log (does not touch favourites/history)">Clear</button>
      </div>
    </details>
  </div>
</div>
