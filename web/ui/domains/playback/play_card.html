  <div class="card has-card-label" id="play-card">
    <span class="card-label" id="playback-label">
      <span id="playback-title">Watch</span>
      <!-- Saved-to-favourites indicator: a ★ shown next to the now-playing
           title when the channel is a favourite (replaces the old duplicate
           "<name> ★" badge). Double-clicking the title opens it in the
           Favourites tab. -->
      <span id="playback-fav-star" style="display:none" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2.5l2.9 6.1 6.6.6-5 4.4 1.5 6.5L12 17.9 6.5 20.6 8 14.1l-5-4.4 6.6-.6z"/></svg></span>
      <span id="playback-live" class="live-dot" style="display:none">live</span>
    </span>
    <div id="play-row-wrap">
      <div class="row play-row">
        <button id="play-btn" class="primary icon-btn" title="Play" aria-label="Play">▶</button>
        <!-- Display of the currently-playing Ace ID. Read-only by
             default; double-click to edit (paste a specific id), or just
             paste (Ctrl+V) anywhere on the page to play a copied id. -->
        <div class="cid-field-wrap">
          <input type="text" id="cid-input"
                 placeholder="Paste ace id or use 'Library'"
                 autocomplete="off" autocorrect="off" spellcheck="false"
                 title="Double-click to edit • paste an Ace ID to play"
                 readonly>
          <button id="cid-clear" class="field-clear"
                  title="Clear input" aria-label="Clear input"
                  style="visibility:hidden">✕</button>
        </div>
        <button id="restream-btn" class="icon-btn" title="Restart stream with current settings (keeps the same channel)" aria-label="Restart stream" style="visibility:hidden">↺</button>
        <!-- Save-to-favourites: a ★ glyph button matching the library's
             row stars. Reserved slot (visibility, not display) so it never
             reflows the input row when Play reveals it. -->
        <button id="save-btn" class="icon-btn" title="Save as favourite"
                aria-label="Save as favourite" style="visibility:hidden"></button>
      </div>
    </div>
    <div class="gate-hint" id="play-hint"></div>
    <div class="err" id="err"></div>
    <div id="now-playing" style="display:none">
      <video id="pb-video" controls playsinline
             style="display:none; width:100%; max-height:55vh; background:#000; margin:.5rem 0"></video>
      <div class="row" style="justify-content: center; gap: .5rem; flex-wrap: wrap">
        <div class="gate-hint" id="pb-video-status" style="margin: 0; min-width: 0; text-align: center" title="Click to hide stats"></div>
        <button id="show-stats-btn" style="display:none">Display Stats</button>
      </div>
    </div>
  </div>
