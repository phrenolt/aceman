  <div class="card has-card-label" id="favs-card">
    <span class="card-label">★ Favourites <span id="storage-badge" class="badge has-tooltip" style="margin-left:.3rem"></span></span>
    <div id="fav-inner">
      <div class="row">
        <input type="text" id="fav-search" placeholder="Search…">
      </div>
      <div class="pager" id="fav-pager" style="display:none">
        <button id="fav-prev">‹ Prev</button>
        <span class="status" id="fav-info"></span>
        <button id="fav-next">Next ›</button>
      </div>
      <div id="fav-list"></div>
      <div id="fav-empty" class="status" style="display:none">
        No favourites yet — play something and click "Save as favourite".
      </div>
    </div>
  </div>
