        <div class="setup-row" id="gpu-card" style="display:none">
          <div class="setup-row-head" style="justify-content:center">
            <span class="tip" data-tip="In-browser player only. Requires GPU device passthrough to the web container.">GPU Acceleration</span>
          </div>
          <div id="gpu-unavailable" style="display:none; text-align:center">
            <span class="gate-hint">No compatible GPU detected — nvidia-smi and VA-API both absent.</span>
          </div>
          <div id="gpu-controls" style="display:none">
            <div class="field" style="gap:1.2rem;flex-wrap:wrap;justify-content:center">
              <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer">
                <input type="checkbox" id="gpu-encode">
                <span class="tip" data-tip="The GPU compresses the video instead of the CPU. CPU stays cooler and freer for other tasks. Quality is the same. Leave this on unless you see problems.">GPU encode</span>
              </label>
              <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer">
                <input type="checkbox" id="gpu-deinterlace">
                <span class="tip" data-tip="Live TV is often recorded in interlaced format — two half-frames stitched together — which looks like horizontal combing on fast motion. This filter merges them into a clean full frame. Only needed for traditional broadcast channels; most streams don't need it.">Deinterlace</span>
              </label>
              <span class="tip"
                    data-tip="The source stream is usually 1080p. If your screen is 4K, the browser would normally stretch that 1080p image to fill the screen, which looks blurry. Turning this on makes the GPU do that stretching before sending it to your browser — the result looks sharper. Uses more GPU and slows buffering on weak hardware.">Upscale to</span>
              <select id="gpu-upscale">
                <option value="">Off — browser scales</option>
                <option value="1080">1080p</option>
                <option value="2160">4K (needs strong GPU)</option>
              </select>
              <span style="white-space:nowrap">Backend: <span id="gpu-backend-label" class="status"></span></span>
            </div>
          </div>
          <div class="gate-hint" id="gpu-hint" style="margin-top:.3rem"></div>
        </div>
